name: Build Offline Bundle

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version'
        default: '22.16.0'
      oc_version:
        description: 'OpenClaw version'
        default: '2026.3.8'
      upload_openlist:
        description: 'Upload to OpenList'
        type: boolean
        default: false
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false

env:
  NODE_VERSION: ${{ github.event.inputs.node_version || '22.16.0' }}
  OC_VERSION: ${{ github.event.inputs.oc_version || '2026.3.8' }}

jobs:
  build:
    name: Build offline .run packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify build tools
        run: |
          echo "Node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "Arch: $(uname -m)"

      - name: Download dependencies
        run: |
          chmod +x scripts/download_deps.sh
          sh scripts/download_deps.sh .offline-cache
        env:
          NODE_VERSION: ${{ env.NODE_VERSION }}
          OC_VERSION: ${{ env.OC_VERSION }}

      - name: Build offline .run (musl only)
        run: |
          chmod +x scripts/build_offline_run.sh
          sh scripts/build_offline_run.sh dist/
        env:
          CACHE_DIR: .offline-cache

      - name: Verify build artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -lh dist/*.run
          echo ""
          echo "=== SHA256 checksums ==="
          sha256sum dist/*.run
          echo ""
          echo "=== Integrity check ==="
          for f in dist/*.run; do
            head -1 "$f" | grep -q '#!/bin/sh' && echo "OK: $(basename $f)" || echo "FAIL: $(basename $f)"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: offline-run-packages
          path: dist/*_offline.run
          retention-days: 30

      - name: Upload to OpenList
        if: github.event.inputs.upload_openlist == 'true'
        run: |
          chmod +x scripts/upload_openlist.sh
          sh scripts/upload_openlist.sh dist/
        env:
          OPENLIST_URL: ${{ secrets.OPENLIST_URL }}
          OPENLIST_USER: ${{ secrets.OPENLIST_USER }}
          OPENLIST_PASS: ${{ secrets.OPENLIST_PASS }}
          OPENLIST_PATH: ${{ secrets.OPENLIST_PATH }}

      - name: Create GitHub Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.OC_VERSION }}-offline
          name: "离线安装包 v${{ env.OC_VERSION }}"
          files: dist/*_offline.run
          body: |
            ## � 离线安装包

            包含 Node.js v${{ env.NODE_VERSION }} + OpenClaw v${{ env.OC_VERSION }} + 全部依赖，**无需联网**。

            | 文件 | 适用设备 |
            |------|---------|
            | `*_x86_64-musl_offline.run` | x86 软路由 (iStoreOS / OpenWrt) |
            | `*_aarch64-musl_offline.run` | ARM64 设备 (R2S/R4S/R5S / 树莓派 + OpenWrt) |

            ### 🚀 安装

            ```bash
            scp luci-app-openclaw_*_offline.run root@路由器IP:/tmp/
            ssh root@路由器IP "sh /tmp/luci-app-openclaw_*_offline.run"
            ```

            安装完成后访问 **LuCI → 服务 → OpenClaw** 配置 API 密钥即可使用。
          draft: false
          prerelease: false
